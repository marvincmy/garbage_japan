<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMART TRASH SCANNER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="app-header">
        <div class="header-topline">
          <div class="header-copy">
            <h1>
              <span class="title-en">Smart Trash Scanner</span>
              <span class="title-zh">關於將垃圾擺喺鏡頭前面就會話你知點掉嘅神奇網頁</span>
            </h1>
            <div class="header-subrow">
              <p data-i18n="subtitle">Place one item in front of the camera to see the matching disposal category and handling tips.</p>
              <div class="language-switch" aria-label="Language switch">
                <button class="lang-button active" type="button" data-lang="en">EN</button>
                <button class="lang-button" type="button" data-lang="zh">中文</button>
              </div>
            </div>
          </div>
        </div>
      </header>

      <main class="app-layout" aria-live="polite">
        <section class="camera-panel" aria-label="Camera preview">
          <div id="webcam-container">
            <div id="no-garbage-overlay" aria-hidden="true" data-i18n="noGarbage">No Garbage Detected</div>
          </div>
        </section>

        <div class="detected-card" aria-live="polite">
          <p class="detected-eyebrow" data-i18n="detectedItemLabel">Detected Item</p>
          <div class="detected-main">
            <span id="detected-item-name" data-i18n="waitingDetection">Waiting for detection</span>
            <span id="detected-item-state" data-i18n="scanHint">Show one item to the camera</span>
          </div>
          <p id="detected-item-tip" class="detected-tip" data-i18n="scanHint">Show one item to the camera</p>
        </div>

        <section class="bins-panel" aria-label="Garbage categories">
          <h2 data-i18n="garbageTypes">Garbage Types</h2>
          <div class="bins-grid">
            <button id="bin-burnable" class="bin" data-type="burnable" type="button" aria-label="Burnable - 燃えるごみ">
              <span class="bin-glass" aria-hidden="true"></span>
              <svg viewBox="0 0 64 64" role="img" aria-hidden="true">
                <path d="M32 8 C26 16 16 24 16 36 C16 48 23 56 32 56 C41 56 48 48 48 36 C48 24 38 16 32 8 Z"/>
                <path d="M32 30 C28 35 27 42 30 47 C31 49 33 49 34 47 C37 42 36 35 32 30 Z"/>
              </svg>
              <span class="en" data-label-key="burnable">Burnable</span>
              <span class="jp">燃えるごみ</span>
            </button>

            <button id="bin-non-burnable" class="bin" data-type="non-burnable" type="button" aria-label="Non-burnable - 燃えないごみ">
              <span class="bin-glass" aria-hidden="true"></span>
              <svg viewBox="0 0 64 64" role="img" aria-hidden="true">
                <rect x="18" y="20" width="28" height="36" rx="4" />
                <rect x="14" y="14" width="36" height="6" rx="3" />
                <line x1="26" y1="28" x2="26" y2="48" />
                <line x1="32" y1="28" x2="32" y2="48" />
                <line x1="38" y1="28" x2="38" y2="48" />
                <circle cx="32" cy="8" r="4" />
              </svg>
              <span class="en" data-label-key="non-burnable">Non-burnable</span>
              <span class="jp">燃えないごみ</span>
            </button>

            <button id="bin-glass-pet" class="bin" data-type="glass-pet" type="button" aria-label="Glass and PET - 空きびん・ペットボトル">
              <span class="bin-glass" aria-hidden="true"></span>
              <svg viewBox="0 0 64 64" role="img" aria-hidden="true">
                <line x1="10" y1="10" x2="26" y2="10"/>
                <path d="M10 10 C10 20 15 26 18 30 C21 26 26 20 26 10"/>
                <line x1="18" y1="30" x2="18" y2="50"/>
                <line x1="13" y1="50" x2="23" y2="50"/>
                <rect x="37" y="8" width="6" height="4" rx="1"/>
                <path d="M37 12 L43 12 L43 18 C47 20 50 25 50 31 L50 52 C50 55 48 57 45 57 L35 57 C32 57 30 55 30 52 L30 31 C30 25 33 20 37 18 Z"/>
              </svg>
              <span class="en" data-label-key="glass-pet">Glass &amp; PET</span>
              <span class="jp">空きびん・ペットボトル</span>
            </button>

            <button id="bin-oversized" class="bin" data-type="oversized" type="button" aria-label="Oversized - 粗大ごみ">
              <span class="bin-glass" aria-hidden="true"></span>
              <svg viewBox="0 0 64 64" role="img" aria-hidden="true">
                <rect x="8" y="24" width="48" height="22" rx="3" />
                <line x1="8" y1="35" x2="56" y2="35" />
                <circle cx="18" cy="50" r="4" />
                <circle cx="46" cy="50" r="4" />
                <path d="M20 20 V12 H44 V20" />
              </svg>
              <span class="en" data-label-key="oversized">Oversized</span>
              <span class="jp">粗大ごみ</span>
            </button>

            <button id="bin-paper" class="bin" data-type="paper" type="button" aria-label="Paper - 古紙">
              <span class="bin-glass" aria-hidden="true"></span>
              <svg viewBox="0 0 64 64" role="img" aria-hidden="true">
                <rect x="16" y="16" width="30" height="38" rx="3" />
                <path d="M26 16 V8 H54 V46 H46" />
                <line x1="22" y1="28" x2="40" y2="28" />
                <line x1="22" y1="36" x2="40" y2="36" />
                <line x1="22" y1="44" x2="34" y2="44" />
              </svg>
              <span class="en" data-label-key="paper">Paper</span>
              <span class="jp">古紙</span>
            </button>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
